<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prévention & Aide - Carte des ressources</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .header {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
            font-size: 14px;
            pointer-events: none;
        }
        .footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
            font-family: monospace;
        }
        a { pointer-events: auto; }

        .panel-launcher {
            position: absolute;
            top: 80px;
            left: 10px;
            z-index: 1000;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
        .panel-launcher:hover { background: #34495e; }

        .panel {
            position: absolute;
            top: 80px;
            left: 64px;
            z-index: 1000;
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
            width: 220px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            font-size: 13px;
        }
        .panel.hidden { display: none; }
        .panel-close {
            cursor: pointer;
            padding: 0 4px;
            margin-left: 4px;
        }
        .panel-header {
            background: #2c3e50;
            color: white;
            padding: 8px 12px;
            border-radius: 8px 8px 0 0;
            cursor: move;
            user-select: none;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-toggle {
            cursor: pointer;
            padding: 0 4px;
        }
        .panel-body {
            overflow-y: auto;
            padding: 4px 0;
        }
        .panel.collapsed .panel-body { display: none; }
        .panel.collapsed { max-height: none; }
        .continent-title {
            font-weight: bold;
            padding: 6px 12px;
            cursor: pointer;
            background: #f5f5f5;
            display: flex;
            justify-content: space-between;
        }
        .continent-title:hover { background: #e8e8e8; }
        .country-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .country-list.collapsed { display: none; }
        .country-list li {
            padding: 4px 20px;
            cursor: pointer;
        }
        .country-list li:hover { background: #ecf0f1; }

        .panel-launcher.add { top: 134px; background: #27ae60; }
        .panel-launcher.add:hover { background: #2ecc71; }

        .form-panel { width: 240px; }
        .form-panel .panel-body { padding: 10px 12px; gap: 6px; display: flex; flex-direction: column; }
        .form-panel label { font-size: 11px; color: #555; margin-top: 4px; }
        .form-panel select,
        .form-panel input {
            padding: 5px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }
        .form-panel button.submit {
            margin-top: 8px;
            padding: 7px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .form-panel button.submit:hover { background: #2ecc71; }
        .form-panel .error { color: #c0392b; font-size: 11px; min-height: 14px; }
    </style>
</head>
<body>
<div class="header">
    <strong>🧭 Aide & Prévention</strong> – Centres d’addictologie, associations, soutien victimes.<br>
    ⚠️ En cas d'urgence immédiate : <strong>17</strong> (police) ou <strong>112</strong> (Europe).
</div>
<div id="map"></div>
<button class="panel-launcher" id="panel-launcher" title="Aller à...">🌍</button>
<button class="panel-launcher add" id="form-launcher" title="Ajouter un contact">➕</button>
<div class="panel hidden" id="panel">
    <div class="panel-header" id="panel-header">
        <span>🌍 Aller à...</span>
        <span>
            <span class="panel-toggle" id="panel-toggle">−</span>
            <span class="panel-close" id="panel-close">×</span>
        </span>
    </div>
    <div class="panel-body" id="panel-body"></div>
</div>
<div class="panel form-panel hidden" id="form-panel">
    <div class="panel-header" id="form-header">
        <span>➕ Ajouter un contact</span>
        <span class="panel-close" id="form-close">×</span>
    </div>
    <div class="panel-body">
        <label for="f-continent">Continent</label>
        <select id="f-continent"><option value="">— choisir —</option></select>

        <label for="f-pays">Pays</label>
        <select id="f-pays" disabled><option value="">— choisir —</option></select>

        <label for="f-ville">Ville</label>
        <input id="f-ville" type="text" placeholder="Ex. Lyon" />

        <label for="f-snap">Snap (optionnel)</label>
        <input id="f-snap" type="text" placeholder="pseudo" />

        <label for="f-tel">Numéro (optionnel)</label>
        <input id="f-tel" type="tel" placeholder="+33 6 12 34 56 78" />

        <label for="f-tg">Telegram (optionnel)</label>
        <input id="f-tg" type="text" placeholder="@pseudo" />

        <label for="f-wa">WhatsApp (optionnel)</label>
        <input id="f-wa" type="tel" placeholder="+33 6 12 34 56 78" />

        <div class="error" id="f-error"></div>
        <button class="submit" id="f-submit">Ajouter sur la carte</button>
    </div>
</div>
<div class="footer">
    Données indicatives | <a href="https://www.drogues.gouv.fr/" target="_blank">drogues.gouv.fr</a> | <a href="https://www.pharos.controle.gouv.fr/" target="_blank">Signalement Pharos</a>
</div>

<script>
    // Initialisation : vue globale au lancement, l'utilisateur zoome ensuite
    var map = L.map('map', { worldCopyJump: true, minZoom: 2 }).setView([20, 0], 2);

    // Fond de carte OpenStreetMap (libre et sans tracking)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CartoDB</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // Icônes selon le type
    var icones = {
        addictologie: L.divIcon({ html: "🏥", className: "custom-icon", iconSize: [25,25] }),
        "réduction risques": L.divIcon({ html: "💉", className: "custom-icon", iconSize: [25,25] }),
        "aide victimes": L.divIcon({ html: "🛡️", className: "custom-icon", iconSize: [25,25] }),
        soins: L.divIcon({ html: "🩺", className: "custom-icon", iconSize: [25,25] })
    };

    function ajouterRessources(ressources) {
        ressources.forEach(r => {
            var marker = L.marker([r.lat, r.lng], { icon: icones[r.type] || L.divIcon({ html: "📍" }) }).addTo(map);
            marker.bindPopup(`
                <b>${r.nom}</b><br>
                ${r.adresse}<br>
                📞 ${r.tel}<br>
                <i>${r.type}</i><br>
                <a href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}" target="_blank">🗺️ Itinéraire</a>
            `);
        });
    }

    // Chargement des ressources depuis le fichier JSON externe
    fetch('resources.json')
        .then(response => {
            if (!response.ok) throw new Error('HTTP ' + response.status);
            return response.json();
        })
        .then(ajouterRessources)
        .catch(err => {
            console.error("Impossible de charger resources.json :", err);
            L.popup()
                .setLatLng(map.getCenter())
                .setContent("⚠️ Impossible de charger les ressources. Réessayez plus tard.")
                .openOn(map);
        });

    // Panneau de navigation par continent/pays
    var panel = document.getElementById('panel');
    var panelBody = document.getElementById('panel-body');
    var panelHeader = document.getElementById('panel-header');
    var panelToggle = document.getElementById('panel-toggle');
    var panelLauncher = document.getElementById('panel-launcher');
    var panelClose = document.getElementById('panel-close');

    // Empêche Leaflet de capter clics/scroll/drag faits sur le panneau et le bouton
    L.DomEvent.disableClickPropagation(panel);
    L.DomEvent.disableScrollPropagation(panel);
    L.DomEvent.disableClickPropagation(panelLauncher);

    // Ouvrir / fermer le panneau via le bouton
    panelLauncher.addEventListener('click', () => {
        panel.classList.remove('hidden');
        panelLauncher.style.display = 'none';
    });
    panelClose.addEventListener('click', (e) => {
        e.stopPropagation();
        panel.classList.add('hidden');
        panelLauncher.style.display = '';
    });

    function construirePanneau(continents) {
        Object.keys(continents).forEach(nomCont => {
            var section = document.createElement('div');
            var titre = document.createElement('div');
            titre.className = 'continent-title';
            titre.innerHTML = '<span>' + nomCont + '</span><span class="caret">▸</span>';

            var ul = document.createElement('ul');
            ul.className = 'country-list collapsed';

            continents[nomCont].forEach(pays => {
                var li = document.createElement('li');
                li.textContent = pays.nom;
                li.addEventListener('click', () => map.flyTo([pays.lat, pays.lng], pays.zoom));
                ul.appendChild(li);
            });

            titre.addEventListener('click', () => {
                ul.classList.toggle('collapsed');
                titre.querySelector('.caret').textContent = ul.classList.contains('collapsed') ? '▸' : '▾';
            });

            section.appendChild(titre);
            section.appendChild(ul);
            panelBody.appendChild(section);
        });
    }

    fetch('countries.json')
        .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status))
        .then(data => { construirePanneau(data); peuplerSelects(data); })
        .catch(err => console.error("Impossible de charger countries.json :", err));

    // Bouton réduire/agrandir
    panelToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        panel.classList.toggle('collapsed');
        panelToggle.textContent = panel.classList.contains('collapsed') ? '+' : '−';
    });

    // Rend un panneau déplaçable par son header (souris + tactile)
    function rendreDraggable(panneau, header, ignorerCibles) {
        var dragging = false, offsetX = 0, offsetY = 0;
        header.addEventListener('pointerdown', (e) => {
            if (ignorerCibles && ignorerCibles.includes(e.target)) return;
            dragging = true;
            offsetX = e.clientX - panneau.offsetLeft;
            offsetY = e.clientY - panneau.offsetTop;
            header.setPointerCapture(e.pointerId);
        });
        header.addEventListener('pointermove', (e) => {
            if (!dragging) return;
            var x = Math.max(0, Math.min(window.innerWidth - panneau.offsetWidth, e.clientX - offsetX));
            var y = Math.max(0, Math.min(window.innerHeight - 40, e.clientY - offsetY));
            panneau.style.left = x + 'px';
            panneau.style.top = y + 'px';
        });
        header.addEventListener('pointerup', () => dragging = false);
    }
    rendreDraggable(panel, panelHeader, [panelToggle, panelClose]);

    // -------- Panneau "Ajouter un contact" --------
    var formPanel = document.getElementById('form-panel');
    var formHeader = document.getElementById('form-header');
    var formClose = document.getElementById('form-close');
    var formLauncher = document.getElementById('form-launcher');
    var selContinent = document.getElementById('f-continent');
    var selPays = document.getElementById('f-pays');
    var inVille = document.getElementById('f-ville');
    var inSnap = document.getElementById('f-snap');
    var inTel = document.getElementById('f-tel');
    var inTg = document.getElementById('f-tg');
    var inWa = document.getElementById('f-wa');
    var errBox = document.getElementById('f-error');
    var btnSubmit = document.getElementById('f-submit');

    L.DomEvent.disableClickPropagation(formPanel);
    L.DomEvent.disableScrollPropagation(formPanel);
    L.DomEvent.disableClickPropagation(formLauncher);
    rendreDraggable(formPanel, formHeader, [formClose]);

    formLauncher.addEventListener('click', () => {
        formPanel.classList.remove('hidden');
        formLauncher.style.display = 'none';
    });
    formClose.addEventListener('click', (e) => {
        e.stopPropagation();
        formPanel.classList.add('hidden');
        formLauncher.style.display = '';
    });

    // Données pays pour le formulaire (rempli quand countries.json est chargé)
    var continentsData = {};
    function peuplerSelects(continents) {
        continentsData = continents;
        Object.keys(continents).forEach(c => {
            var opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            selContinent.appendChild(opt);
        });
    }
    selContinent.addEventListener('change', () => {
        selPays.innerHTML = '<option value="">— choisir —</option>';
        var pays = continentsData[selContinent.value] || [];
        pays.forEach((p, i) => {
            var opt = document.createElement('option');
            opt.value = i;
            opt.textContent = p.nom;
            selPays.appendChild(opt);
        });
        selPays.disabled = pays.length === 0;
    });

    // Liens contact -> URL cliquable
    function lienContact(type, valeur) {
        var v = valeur.trim();
        if (!v) return '';
        if (type === 'snap')   return '<a href="https://snapchat.com/add/' + encodeURIComponent(v.replace(/^@/, '')) + '" target="_blank">👻 ' + v + '</a>';
        if (type === 'tel')    return '<a href="tel:' + v.replace(/[^+0-9]/g, '') + '">📞 ' + v + '</a>';
        if (type === 'tg')     return '<a href="https://t.me/' + encodeURIComponent(v.replace(/^@/, '')) + '" target="_blank">✈️ ' + v + '</a>';
        if (type === 'wa')     return '<a href="https://wa.me/' + v.replace(/[^0-9]/g, '') + '" target="_blank">💬 ' + v + '</a>';
        return '';
    }

    function popupHtml(c) {
        var lignes = [];
        if (c.snap) lignes.push(lienContact('snap', c.snap));
        if (c.tel)  lignes.push(lienContact('tel',  c.tel));
        if (c.tg)   lignes.push(lienContact('tg',   c.tg));
        if (c.wa)   lignes.push(lienContact('wa',   c.wa));
        return '<b>' + c.ville + '</b><br>' +
               '<small>' + c.pays + ' — ' + c.continent + '</small><br>' +
               lignes.join('<br>');
    }

    var iconeContact = L.divIcon({ html: "👤", className: "custom-icon", iconSize: [25,25] });

    function ajouterContactSurCarte(c) {
        L.marker([c.lat, c.lng], { icon: iconeContact })
            .addTo(map)
            .bindPopup(popupHtml(c));
    }

    // Persistance via localStorage
    var STORE_KEY = 'contacts_v1';
    function chargerContactsStockes() {
        try {
            var brut = localStorage.getItem(STORE_KEY);
            return brut ? JSON.parse(brut) : [];
        } catch (e) { return []; }
    }
    function sauverContact(c) {
        var liste = chargerContactsStockes();
        liste.push(c);
        try { localStorage.setItem(STORE_KEY, JSON.stringify(liste)); } catch (e) {}
    }

    btnSubmit.addEventListener('click', () => {
        errBox.textContent = '';
        var continent = selContinent.value;
        var idx = selPays.value;
        var ville = inVille.value.trim();
        var snap = inSnap.value.trim();
        var tel = inTel.value.trim();
        var tg = inTg.value.trim();
        var wa = inWa.value.trim();

        if (!continent || idx === '' || !ville) {
            errBox.textContent = 'Continent, pays et ville sont requis.';
            return;
        }
        if (!snap && !tel && !tg && !wa) {
            errBox.textContent = 'Renseigne au moins un moyen de contact.';
            return;
        }

        var pays = continentsData[continent][parseInt(idx, 10)];
        var contact = {
            continent: continent,
            pays: pays.nom,
            ville: ville,
            lat: pays.lat,
            lng: pays.lng,
            snap: snap, tel: tel, tg: tg, wa: wa
        };
        ajouterContactSurCarte(contact);
        sauverContact(contact);
        map.flyTo([contact.lat, contact.lng], Math.max(pays.zoom, 6));

        inVille.value = ''; inSnap.value = ''; inTel.value = '';
        inTg.value = ''; inWa.value = '';
        errBox.textContent = '';
    });

    // Recharge les contacts déjà ajoutés
    chargerContactsStockes().forEach(ajouterContactSurCarte);

    // Avertissement légal dans la console (trace)
    console.log("Carte d'aide légale - Aucune donnée personnelle ni dénonciation publique.");
</script>
</body>
</html>
